<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Z Customs — Online Expo</title>
  <meta name="description" content="Z Customs — Expo en ligne de casquettes custom uniques. Bleach dye, piercings métalliques, distressed. Chaque pièce est une œuvre."/>
  <meta property="og:title" content="Z Customs — Online Expo"/>
  <meta property="og:description" content="Casquettes custom uniques — techniques de destruction appliquées au streetwear."/>
  <meta property="og:type" content="website"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Space+Mono&family=Caveat:wght@600&display=swap" rel="stylesheet"/>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/tokens.css"/>
  <link rel="stylesheet" href="css/layout.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <link rel="stylesheet" href="css/responsive.css"/>
</head>
<body>
<div id="app">

  <!-- ── NAV ── -->
  <nav>
    <div class="nav-inner">
      <div class="nav-brand" onclick="goTo('hero')">Z CUSTOMS</div>
      <div class="nav-links">
        <button class="nav-link active" data-page="hero" onclick="goTo('hero')">EXPO</button>
        <button class="nav-link" data-page="collection" onclick="goTo('collection')">COLLECTION</button>
      </div>
      <button class="nav-hamburger" onclick="toggleMenu()" aria-label="menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Mobile menu -->
  <div class="mobile-menu" id="mobileMenu">
    <button class="mm-link active" data-page="hero" onclick="goTo('hero');toggleMenu()">EXPO</button>
    <button class="mm-link" data-page="collection" onclick="goTo('collection');toggleMenu()">COLLECTION</button>
  </div>

  <!-- Global Overlays -->
  <div class="stripe-layer hero-only" id="heroStripes"></div>
  <div class="ghost-text hero-only">Z CUSTOMS</div>
  <div class="duo-badge hero-only" id="heroBadge">DUO NO. 01</div>

  <div class="pages">

    <!-- ════ HERO ════ -->
    <section id="page-hero" class="page active" data-screen-label="01 Expo">
      <!-- Above fold -->
      <div class="hero-fold">
        <div class="dot-grid"></div>

        <div class="carousel-wrap">
          <div class="carousel-track" id="carouselTrack"></div>
          <button class="carousel-arrow arrow-left" id="arrowL" style="display:none" onclick="carouselStep(-1)">←</button>
          <button class="carousel-arrow arrow-right" id="arrowR" style="display:none" onclick="carouselStep(1)">→</button>
        </div>

        <div class="dot-nav" id="dotNav">
          <span class="dot-label" style="font-family:var(--mono);font-size:9px;color:var(--gray)">↓ scroll</span>
        </div>
      </div>

      <!-- Below fold — injected by JS -->
      <div id="heroBelowFold"></div>
    </section>

    <!-- ════ COLLECTION ════ -->
    <section id="page-collection" class="page slide-right" data-screen-label="02 Collection">
      <div class="dot-grid"></div>
      <div class="stripe-layer" id="collStripes"></div>

      <div class="coll-header">
        <div class="coll-title">COLLECTION</div>
        <div class="coll-count" id="collCount"></div>
      </div>
      <div class="coll-body">
        <div class="coll-grid" id="collGrid"></div>
      </div>

      <div class="page-footer">
        <span class="footer-txt">Z CUSTOMS · DESTROY ART · 2025</span>
        <span class="footer-txt">TOUTES PIÈCES UNIQUES</span>
      </div>
    </section>

    <!-- ════ DETAIL ════ -->
    <section id="page-detail" class="page slide-right" data-screen-label="03 Pièce">
      <div class="dot-grid"></div>
      <div class="detail-topbar">
        <button class="back-btn" onclick="closeDetail()">← RETOUR</button>
        <div class="detail-counter" id="detailCounter"></div>
      </div>
      <div class="detail-layout">
        <div class="detail-viewer-wrap">
          <div class="cap-viewer" id="detailViewerEl"></div>
        </div>
        <div class="detail-info" id="detailInfo"></div>
      </div>
      <div class="page-footer">
        <span class="footer-txt">Z CUSTOMS · 2025</span>
        <span class="footer-txt" id="detailFooterTag"></span>
      </div>
    </section>

  </div><!-- .pages -->
</div><!-- #app -->

<!-- SharedArrayBuffer fix for GitHub Pages -->
<script>
  if (!window.crossOriginIsolated) {
    window.SharedArrayBuffer = undefined;
  }
</script>

<!-- 3D Engine -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
  import * as GaussianSplats3D from 'https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js';
  window.GaussianSplats3D = GaussianSplats3D;
</script>

<!-- Application -->
<script type="module" src="js/app.js"></script>
</body>
</html>
